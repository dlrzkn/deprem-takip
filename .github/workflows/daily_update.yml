name: Otomatik Deprem Guncelleme

on:
  schedule:
    - cron: '*/5 * * * *' # Bu satır her 5 dakikada bir çalışmasını sağlar
  workflow_dispatch: # Bu da istediğinde elle başlatman için buton ekler

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests pandas gspread google-auth

      - name: Run update script
        env:
          GCP_KEY: ${{ secrets.GCP_KEY }}
        run: python update_script.py
