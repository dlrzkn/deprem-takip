name: Otomatik Deprem Guncelleme

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests pandas gspread google-auth

      - name: Run update script
        env:
          # BURASI KRİTİK: GitHub Secrets'taki ismin tam olarak bu olduğundan emin ol
          GCP_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: python update_script.py
