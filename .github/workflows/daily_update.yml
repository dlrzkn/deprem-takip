name: Otomatik Deprem Guncelleme
on:
  schedule:
    - cron: '0 * * * *' # Bu, her saat başı otomatik çalıştır demek
  workflow_dispatch: # İstediğinde manuel çalıştırman için buton ekler
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Paketleri Yukle
        run: pip install pandas requests gspread google-auth
      - name: Kodu Calistir
        env:
          GCP_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: python update_script.py
